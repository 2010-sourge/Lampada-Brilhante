<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Bulb Effect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bulb-container">
        <input type="checkbox" id="btn-switch">

        <label for="btn-switch" class="bulb-box">
            <div class="bulb-images">
                <img src="https://i.postimg.cc/KjdfM3b6/bulb-off.png" class="bulb-off" alt="Bulb Off">
                <img src="https://i.postimg.cc/65QxYf40/bulb-on.png" class="bulb-on" alt="Bulb On">
            </div>
            
            <div class="button-mock"></div>
        </label>
    </div>

</body>
</html>
